# CI Pipeline — Arthur's Portfolio
#
# Runs on every PR targeting main (pull_request only — direct pushes to main
# run no CI). Five jobs run in parallel:
#   • lint-and-typecheck — ESLint + tsc --noEmit
#   • build              — next build (static export, verifies the site compiles)
#   • npm-audit          — flags high/critical CVEs in production dependencies
#   • secret-scan        — gitleaks secret scanning (shared cicd workflow)
#   • version-check      — VERSION bumped vs main and in lockstep with package.json

name: CI

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

# Cancel any in-progress run for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — read-only is sufficient for all jobs here.
permissions:
  contents: read
  pull-requests: read

jobs:
  lint-and-typecheck:
    uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/ci-nextjs-lint-typecheck.yml@main

  build:
    uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/ci-nextjs-build.yml@main
    with:
      upload_artifact: true

  npm-audit:
    uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/ci-npm-audit.yml@main

  secret-scan:
    uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/secret-scan.yml@main

  version-check:
    name: Version check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Needless2Say/kriegerdataforge-cicd
          ref: main
          path: .cicd

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Run version check
        run: python .cicd/scripts/common/check_version.py --skip-init --check-package-json
