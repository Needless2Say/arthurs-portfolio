services:
  portfolio:
    build:
      context: .
      target: dev
    image: arthurs-portfolio-dev
    ports:
      - "3002:3000"
    volumes:
      - .:/app
      - portfolio_node_modules:/app/node_modules
      - portfolio_next:/app/.next
    environment:
      - NODE_ENV=development
      # Enables filesystem polling so hot-reload works on Docker for Windows
      - WATCHPACK_POLLING=true

volumes:
  portfolio_node_modules:
  portfolio_next:
