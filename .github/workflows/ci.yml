# CI Pipeline — Arthur's Portfolio
#
# Runs lint, type-check, static export build verification, and npm audit on
# every push to main and on every PR targeting main.  Three jobs run in parallel:
#   • lint-and-typecheck — ESLint + tsc --noEmit
#   • build             — next build (static export, verifies the site compiles)
#   • npm-audit         — flags high/critical CVEs in production dependencies
#
# Security scanning is handled by a separate codeql.yml workflow (if added).

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

# Cancel any in-progress run for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — read-only is sufficient for all jobs here.
permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint · Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: make ci-lint

      - name: Type-check
        run: make ci-typecheck

  build:
    name: Build (Static Export)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: make ci-build

      - name: Upload static export
        uses: actions/upload-artifact@v7
        with:
          name: static-export
          path: out/
          retention-days: 3

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical CVEs
        # Fails only on high or critical vulnerabilities in production
        # dependencies. Dev-only packages are excluded via --omit=dev.
        run: make ci-npm-audit
