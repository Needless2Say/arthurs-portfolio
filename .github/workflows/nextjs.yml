# Deploy — Arthur's Portfolio → GitHub Pages
#
# Builds the Next.js static export and deploys it to GitHub Pages on every
# push to main and on manual dispatch.
#
# configure-pages is intentionally omitted: basePath, assetPrefix, and
# images.unoptimized are already set in next.config.ts and configure-pages
# cannot parse TypeScript configs that contain webpack callbacks — it silently
# drops those settings, which corrupts the build.

name: Deploy Next.js site to Pages

on:
  # Manual dispatch only — no auto-deploy on push.
  # The "github-pages" environment below requires reviewer approval before
  # the deploy job runs (configure reviewers in this repo's Settings →
  # Environments → github-pages → Required reviewers).
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 0.1.0) — specify an older version to roll back'
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

# Do not cancel in-progress deployments; let them finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_EMAILJS_SERVICE_ID:  ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY:  ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
